                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        name:
                          type: string
                          example: Contribution Processing Fee
                        fee_type:
                          type: string
                          example: percentage
                        value:
                          type: number
