          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /superadmin/admins/{userId}/role:
    patch:
      tags: [SuperAdmin - Admins]
      summary: Promote or demote user role
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:
                  type: string
                  enum: [member, admin, super_admin]
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ─── SUPERADMIN: AUDIT ────────────────────────────────────────────────────────
  /superadmin/audit-logs:
    get:
      tags: [SuperAdmin - Audit]
      summary: Searchable audit trail
      parameters:
        - name: action
          in: query
          schema:
            type: string
          description: "e.g. user_banned, payout_disbursed"
        - name: actorId
          in: query
          schema:
            type: string
            format: uuid
        - name: entityType
          in: query
          schema:
            type: string
        - name: startDate
          in: query
          schema:
            type: string
            format: date
        - name: endDate
          in: query
          schema:
            type: string
            format: date
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Audit logs
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        actor_id:
                          type: string
                          format: uuid
                        action:
                          type: string
                        entity_type:
                          type: string
                        entity_id:
                          type: string
                          format: uuid
                        changes:
                          type: object
                        ip_address:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ─── SUPERADMIN: HEALTH ───────────────────────────────────────────────────────
  /superadmin/health:
    get:
      tags: [SuperAdmin - Health]
      summary: Platform health with alert counts
      responses:
        '200':
          description: Platform health
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  database:
                    type: object
                    properties:
                      connected:
                        type: boolean
                        example: true
                  alerts:
                    type: object
                    properties:
                      pendingPayouts:
                        type: integer
                        example: 3
                      failedTransactions24h:
                        type: integer
                        example: 0
                      pendingKycVerifications:
                        type: integer
                        example: 42
                      expiredWithdrawals:
                        type: integer
                        example: 1
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
