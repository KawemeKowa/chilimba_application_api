              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      users:
                        type: object
                        properties:
                          total:
                            type: integer
                          active:
                            type: integer
                          pending_verification:
                            type: integer
                          registered_today:
                            type: integer
                          registered_last_7d:
                            type: integer
                      groups:
                        type: object
                        properties:
                          total:
                            type: integer
                          active:
                            type: integer
                          avg_monthly_amount:
                            type: number
                      transactions:
                        type: object
                        properties:
                          total_volume:
                            type: string
