openapi: 3.0.3
info:
  title: Chilimba Digital Village Banking API
  description: |
    Chilimba is a digital village banking and fund-pooling platform. This API covers
    member authentication, group management, contribution tracking, multi-member
    withdrawal voting, committee pool crowdfunding, group messaging, wallet management,
    notifications, and full admin/super-admin controls.

    ## Authentication
    Most endpoints require a Bearer JWT in the `Authorization` header.
    Access tokens expire in **15 minutes**. Use `POST /auth/refresh` to rotate.

    ## Rate Limiting
    - Global: 100 requests per 15 minutes
    - Auth endpoints (`/auth/register`, `/auth/login`): 10 requests per 15 minutes

    ## Response Envelope
    | Shape | When |
    |---|---|
    | `{ "success": true, "data": {...} }` | Single object |
    | `{ "success": true, "data": [...], "pagination": {...} }` | Paginated list |
    | `{ "success": false, "message": "..." }` | Error |
    | `{ "success": false, "message": "Validation failed", "errors": [...] }` | 422 |

    ## Roles
    | Role | Access |
    |---|---|
    | `member` | All `/api/` user endpoints |
    | `admin` | All `/api/admin/` endpoints |
    | `super_admin` | All endpoints |
  version: 1.0.0
  contact:
    email: kawemekowa@gmail.com
  license:
    name: Private

servers:
  - url: http://localhost:3000/api
    description: Local development
  - url: https://api.chilimba.app/api
    description: Production

security:
  - BearerAuth: []

tags:
  - name: Health
    description: Public liveness probe
  - name: Auth
    description: Registration, login, token management, profile
  - name: Groups
    description: Chilimba group lifecycle management
  - name: Contributions
    description: Monthly dues tracking and payment
  - name: Withdrawals
    description: Group fund withdrawal with multi-member approval voting
  - name: Committees
    description: Voluntary crowdfunding campaigns within a group
  - name: Messages
    description: Group message board with threaded replies
  - name: Wallet
    description: Personal and group wallets with transaction history
  - name: Notifications
    description: Per-user notification management
  - name: Admin - Users
    description: "Required role: admin or super_admin"
  - name: Admin - Groups
    description: "Required role: admin or super_admin"
  - name: Admin - Payouts
    description: "Required role: admin or super_admin"
  - name: Admin - Withdrawals
    description: "Required role: admin or super_admin"
  - name: Admin - Fees
    description: "Required role: admin or super_admin"
  - name: Admin - Notifications
    description: "Required role: admin or super_admin"
  - name: SuperAdmin - Analytics
    description: "Required role: super_admin"
  - name: SuperAdmin - Settings
    description: "Required role: super_admin"
  - name: SuperAdmin - Admins
    description: "Required role: super_admin"
  - name: SuperAdmin - Audit
    description: "Required role: super_admin"
  - name: SuperAdmin - Health
    description: "Required role: super_admin"

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Obtain via POST /auth/login or POST /auth/register"

  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Description of error

    ValidationErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Validation failed
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
                example: monthlyAmount
              message:
                type: string
                example: Must be a number greater than 0

    Pagination:
      type: object
      properties:
        total:
          type: integer
          example: 250
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        totalPages:
          type: integer
          example: 13

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        first_name:
          type: string
          example: Bwalya
        last_name:
          type: string
          example: Mwale
        email:
          type: string
          format: email
          example: bwalya@example.com
        phone:
          type: string
          example: "+260976543210"
        role:
          type: string
          enum: [member, admin, super_admin]
        status:
          type: string
          enum: [pending_verification, active, suspended, banned]
        date_of_birth:
          type: string
          format: date
          nullable: true
        id_type:
          type: string
          nullable: true
        id_verified:
          type: boolean
        profile_photo_url:
          type: string
          nullable: true
        last_login_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    Group:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: Lusaka North Chilimba
        description:
          type: string
          nullable: true
        monthly_amount:
          type: number
          example: 500
        max_members:
          type: integer
          example: 12
        current_members:
          type: integer
          example: 8
        contribution_day:
          type: integer
          example: 1
        payout_day:
          type: integer
          example: 25
        currency:
          type: string
          example: ZMW
        status:
          type: string
          enum: [pending, active, paused, completed, dissolved]
        min_approvals_withdrawal:
          type: integer
          example: 3
        invite_code:
          type: string
          example: AB12CD34
        cover_photo_url:
          type: string
          nullable: true
          example: "https://lmfipdmsunabohstgixg.supabase.co/storage/v1/object/public/files/groups/uuid/cover"
        created_at:
          type: string
          format: date-time

    Contribution:
      type: object
      properties:
        id:
          type: string
          format: uuid
        group_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        cycle_number:
          type: integer
          example: 1
        round_number:
          type: integer
          example: 3
        amount_due:
          type: number
          example: 500
        amount_paid:
          type: number
          nullable: true
          example: 500
        status:
          type: string
          enum: [pending, paid, late, waived]
        due_date:
          type: string
          format: date
          example: "2025-06-01"
        paid_at:
          type: string
          format: date-time
          nullable: true

    Withdrawal:
      type: object
      properties:
        id:
          type: string
          format: uuid
        group_id:
          type: string
          format: uuid
        requester_id:
          type: string
          format: uuid
        amount:
          type: number
          example: 1500
        reason:
          type: string
          example: Emergency repair for the group meeting hall
        status:
          type: string
          enum: [pending_approval, approved, rejected, processing, completed, expired]
        approvals_count:
          type: integer
          example: 2
        rejections_count:
          type: integer
          example: 0
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time

    CommitteePool:
      type: object
      properties:
        id:
          type: string
          format: uuid
        group_id:
          type: string
          format: uuid
        created_by:
          type: string
          format: uuid
        title:
          type: string
          example: Funeral support for Mama Banda
        description:
          type: string
        category:
          type: string
          enum: [funeral, wedding, emergency, other]
        target_amount:
          type: number
          nullable: true
          example: 10000
        total_raised:
          type: number
          example: 3400
        beneficiary:
          type: string
          nullable: true
          example: Banda Family
        status:
          type: string
          enum: [active, closed]
        closes_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    Wallet:
      type: object
      properties:
        id:
          type: string
          format: uuid
        owner_type:
          type: string
          enum: [user, group]
        owner_id:
          type: string
          format: uuid
        balance:
          type: number
          example: 2500.00
        currency:
          type: string
          example: ZMW
        created_at:
          type: string
          format: date-time

    Transaction:
      type: object
      properties:
        id:
          type: string
          format: uuid
        wallet_id:
          type: string
          format: uuid
        type:
          type: string
          enum: [contribution, payout, withdrawal, fee, committee, refund, adjustment]
        direction:
          type: string
          enum: [credit, debit]
        amount:
          type: number
          example: 500
        balance_after:
          type: number
          example: 3000
        reference:
          type: string
          example: CHI-B1C2D3E4-1-1
        description:
          type: string
        created_at:
          type: string
          format: date-time

    Notification:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        type:
          type: string
          example: contribution_due
        title:
          type: string
          example: Contribution Due Tomorrow
        body:
          type: string
          example: Your ZMW 500 contribution for Lusaka North Chilimba is due on 1 Jun.
        data:
          type: object
          nullable: true
        is_read:
          type: boolean
          example: false
        created_at:
          type: string
          format: date-time

    Message:
      type: object
      properties:
        id:
          type: string
          format: uuid
        group_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        content:
          type: string
        parent_id:
          type: string
          format: uuid
          nullable: true
        is_deleted:
          type: boolean
        created_at:
          type: string
          format: date-time

    PayoutSchedule:
      type: object
      properties:
        id:
          type: string
          format: uuid
        group_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        cycle_number:
          type: integer
          example: 1
        payout_order:
          type: integer
          example: 3
        scheduled_date:
          type: string
          format: date
          example: "2025-08-25"
        expected_amount:
          type: number
          example: 6000
        status:
          type: string
          enum: [scheduled, disbursed, skipped]
        first_name:
          type: string
        last_name:
          type: string

  responses:
    Unauthorized:
      description: Missing or invalid access token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: Unauthorized
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: Forbidden
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: Not found
    ValidationError:
      description: Request body failed validation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            message: Too many requests. Please try again later.

paths:
  # ─── PUBLIC ───────────────────────────────────────────────────────────────────
  /health:
    get:
      tags: [Health]
      summary: Liveness probe
      security: []
      responses:
        '200':
          description: API is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time

  # ─── AUTH ─────────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user (must be ≥ 16 years old)
      security: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [firstName, lastName, email, phone, password]
              properties:
                firstName:
                  type: string
                  example: Bwalya
                lastName:
                  type: string
                  example: Mwale
                email:
                  type: string
                  format: email
                  example: bwalya@example.com
                phone:
                  type: string
                  example: "+260976543210"
                password:
                  type: string
                  minLength: 8
                  example: Secure@123
                dateOfBirth:
                  type: string
                  format: date
                  example: "1995-06-15"
                photo:
                  type: string
                  format: binary
                  description: Optional profile photo (JPEG / PNG / WebP / GIF — max 5 MB)
          application/json:
            schema:
              type: object
              required: [firstName, lastName, email, phone, password]
              properties:
                firstName:
                  type: string
                  example: Bwalya
                lastName:
                  type: string
                  example: Mwale
                email:
                  type: string
                  format: email
                  example: bwalya@example.com
                phone:
                  type: string
                  example: "+260976543210"
                password:
                  type: string
                  minLength: 8
                  example: Secure@123
                dateOfBirth:
                  type: string
                  format: date
                  example: "1995-06-15"
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Registration successful
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                      accessToken:
                        type: string
                        description: JWT — expires in 15 minutes
                      refreshToken:
                        type: string
                        description: Opaque token — expires in 7 days
        '400':
          description: Under 16 years old or duplicate email/phone
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login — returns access + refresh tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: bwalya@example.com
                password:
                  type: string
                  example: Secure@123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                      accessToken:
                        type: string
                        description: JWT — expires in 15 minutes
                      refreshToken:
                        type: string
                        description: Opaque token — expires in 7 days
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Account suspended or banned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Rotate refresh token — get new access + refresh tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: New token pair issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      accessToken:
                        type: string
                      refreshToken:
                        type: string
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke refresh token
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      responses:
        '200':
          description: Full user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [Auth]
      summary: Update profile — text fields and/or profile photo
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                phone:
                  type: string
                photo:
                  type: string
                  format: binary
                  description: Profile photo (JPEG / PNG / WebP / GIF — max 5 MB)
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                lastName:
                  type: string
                phone:
                  type: string
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      id:
                        type: string
                      first_name:
                        type: string
                      last_name:
                        type: string
                      email:
                        type: string
                      phone:
                        type: string
                      profile_photo_url:
                        type: string
                        nullable: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/change-password:
    post:
      tags: [Auth]
      summary: Change password — revokes all existing sessions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                newPassword:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Password updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          description: Current password incorrect
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ─── GROUPS ───────────────────────────────────────────────────────────────────
  /groups:
    post:
      tags: [Groups]
      summary: Create a new Chilimba group
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [name, monthlyAmount]
              properties:
                name:
                  type: string
                  maxLength: 150
                  example: Lusaka North Chilimba
                description:
                  type: string
                  example: Family savings group
                monthlyAmount:
                  type: number
                  minimum: 1
                  example: 500
                maxMembers:
                  type: integer
                  minimum: 2
                  maximum: 50
                  example: 12
                contributionDay:
                  type: integer
                  minimum: 1
                  maximum: 28
                  example: 1
                payoutDay:
                  type: integer
                  minimum: 1
                  maximum: 28
                  example: 25
                minApprovalsWithdrawal:
                  type: integer
                  example: 3
                currency:
                  type: string
                  example: ZMW
                photo:
                  type: string
                  format: binary
                  description: Optional group cover photo (JPEG / PNG / WebP / GIF — max 5 MB)
          application/json:
            schema:
              type: object
              required: [name, monthlyAmount]
              properties:
                name:
                  type: string
                  maxLength: 150
                  example: Lusaka North Chilimba
                description:
                  type: string
                  example: Family savings group
                monthlyAmount:
                  type: number
                  minimum: 1
                  example: 500
                maxMembers:
                  type: integer
                  minimum: 2
                  maximum: 50
                  example: 12
                contributionDay:
                  type: integer
                  minimum: 1
                  maximum: 28
                  example: 1
                payoutDay:
                  type: integer
                  minimum: 1
                  maximum: 28
                  example: 25
                minApprovalsWithdrawal:
                  type: integer
                  example: 3
                currency:
                  type: string
                  example: ZMW
      responses:
        '201':
          description: Group created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Group'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
    get:
      tags: [Groups]
      summary: List groups I belong to
      responses:
        '200':
          description: My groups
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Group'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /groups/join:
    post:
      tags: [Groups]
      summary: Join a group via 8-character invite code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [inviteCode]
              properties:
                inviteCode:
                  type: string
                  minLength: 8
                  maxLength: 8
                  example: AB12CD34
      responses:
        '200':
          description: Joined group
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      groupId:
                        type: string
                        format: uuid
                      message:
                        type: string
        '400':
          description: Invalid code, group full, or already a member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /groups/{groupId}:
    parameters:
      - name: groupId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Groups]
      summary: Group detail with member list
      responses:
        '200':
          description: Group details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      group:
                        $ref: '#/components/schemas/Group'
                      members:
                        type: array
                        items:
                          type: object
                          properties:
                            user_id:
                              type: string
                              format: uuid
                            first_name:
                              type: string
                            last_name:
                              type: string
                            role:
                              type: string
                              enum: [owner, admin, member]
                            payout_order:
                              type: integer
                            joined_at:
                              type: string
                              format: date-time
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Groups]
      summary: Update group settings and/or cover photo (group admin only)
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                allowLateContributions:
                  type: boolean
                lateFeeAmount:
                  type: number
                photo:
                  type: string
                  format: binary
                  description: Group cover photo (JPEG / PNG / WebP / GIF — max 5 MB)
          application/json:
            schema:
              type: object
              properties:
                name:
