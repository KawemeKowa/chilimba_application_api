  # ─── ADMIN: PAYOUTS ───────────────────────────────────────────────────────────
  /admin/payouts/pending:
    get:
      tags: [Admin - Payouts]
      summary: Payouts due for disbursement
      responses:
        '200':
          description: Pending payouts
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PayoutSchedule'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/payouts/{payoutScheduleId}/disburse:
    post:
      tags: [Admin - Payouts]
      summary: Trigger payout disbursement to a member
      parameters:
        - name: payoutScheduleId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Payout disbursed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      reference:
                        type: string
                      amountDisbursed:
                        type: number
