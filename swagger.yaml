  # ─── SUPERADMIN: SETTINGS ─────────────────────────────────────────────────────
  /superadmin/settings:
    get:
      tags: [SuperAdmin - Settings]
      summary: All platform settings
      description: |
        | Key | Default | Description |
        |---|---|---|
        | `min_contribution_amount` | 50 | Min monthly contribution (ZMW) |
        | `max_members_per_group` | 50 | Max members per group |
        | `withdrawal_expiry_hours` | 72 | Hours before withdrawal expires |
        | `maintenance_mode` | false | Enable/disable platform |
        | `max_groups_per_user` | 5 | Max groups per user |
        | `kyc_required` | true | Require KYC verification |
      responses:
        '200':
          description: Settings list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        key:
                          type: string
                        value:
                          type: string
                        description:
                          type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /superadmin/settings/{key}:
    patch:
      tags: [SuperAdmin - Settings]
      summary: Update a platform setting by key
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
          example: min_contribution_amount
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value:
                  type: string
                  example: "100"
      responses:
        '200':
          description: Setting updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

