  # ─── WITHDRAWALS ──────────────────────────────────────────────────────────────
  /withdrawals/groups/{groupId}:
    post:
      tags: [Withdrawals]
      summary: Request a group withdrawal
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, reason]
              properties:
                amount:
                  type: number
                  minimum: 0.01
                  example: 1500
                reason:
                  type: string
                  example: Emergency repair for the group meeting hall
      responses:
        '201':
          description: Withdrawal request created — pending member votes
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/Withdrawal'
        '400':
          description: Insufficient group funds or open request already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    get:
      tags: [Withdrawals]
      summary: List withdrawal requests for a group
      parameters:
        - name: groupId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [pending_approval, approved, rejected, processing, completed, expired]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Withdrawal requests with approval votes
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      allOf:
                        - $ref: '#/components/schemas/Withdrawal'
                        - type: object
                          properties:
                            approvals:
                              type: array
                              items:
                                type: object
                                properties:
                                  user_id:
                                    type: string
                                    format: uuid
                                  action:
                                    type: string
                                    enum: [approved, rejected]
                                  comment:
                                    type: string
                                    nullable: true
                                  voted_at:
                                    type: string
                                    format: date-time
                  pagination:
                    $ref: '#/components/schemas/Pagination'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /withdrawals/{withdrawalId}/vote:
    post:
      tags: [Withdrawals]
      summary: Vote to approve or reject a withdrawal
      description: |
        **Lifecycle:** `pending_approval` → (enough approvals) → `approved` → `processing` → `completed`

        `pending_approval` → (enough rejections) → `rejected`

        `pending_approval` → (72h timeout) → `expired`
      parameters:
        - name: withdrawalId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [approved, rejected]
                comment:
                  type: string
                  example: Valid reason, approved.
      responses:
        '200':
          description: Vote recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      withdrawalId:
                        type: string
                        format: uuid
                      newStatus:
                        type: string
                      approvalsCount:
                        type: integer
                      rejectionsCount:
                        type: integer
        '400':
          description: Already voted, or withdrawal is not pending
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

