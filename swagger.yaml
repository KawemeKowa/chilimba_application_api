            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: number
                  minimum: 0
                  example: 0.75
                isActive:
                  type: boolean
      responses:
        '200':
          description: Fee updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ─── ADMIN: BROADCAST ─────────────────────────────────────────────────────────
  /admin/notifications/broadcast:
    post:
      tags: [Admin - Notifications]
      summary: Broadcast notification to users by role
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, body]
              properties:
                title:
                  type: string
                  example: Platform Maintenance
                body:
                  type: string
                  example: "Chilimba will be down for maintenance on Sunday 2–4 AM."
                targetRole:
                  type: string
                  enum: [member, group_admin, admin]
                  description: Omit to broadcast to all users
      responses:
        '200':
          description: Broadcast sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      recipientCount:
                        type: integer
                        example: 980
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

